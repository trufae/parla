name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libjson-glib-dev

      - name: Setup
        run: meson setup builddir

      - name: Build
        run: meson compile -C builddir

  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libjson-glib-dev \
            make \
            dpkg-dev

      - name: Build
        run: make

      - name: Package .deb
        run: make deb

      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v7
        with:
          name: deltachat-gnome-ubuntu-24.04
          path: dist/debian/deltachat-gnome/*.deb
