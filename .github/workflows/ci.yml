name: CI

on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libjson-glib-dev

      - name: Setup
        run: meson setup builddir

      - name: Build
        run: meson compile -C builddir

  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libjson-glib-dev \
            make \
            dpkg-dev

      - name: Build
        run: make

      - name: Package .deb
        run: make deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v7
        with:
          name: parla-deb
          path: dist/debian/parla/*.deb

  build-flatpak:
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged
    steps:
      - uses: actions/checkout@v6

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: dist/flatpak/io.github.trufae.Parla.json
          bundle: parla.flatpak
          cache-key: flatpak-builder-${{ hashFiles('dist/flatpak/io.github.trufae.Parla.json') }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build-deb, build-flatpak]
    runs-on: ubuntu-24.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.flatpak
