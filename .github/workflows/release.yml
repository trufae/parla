name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            meson \
            ninja-build \
            valac \
            libglib2.0-dev \
            libgtk-4-dev \
            libadwaita-1-dev \
            libjson-glib-dev

      - name: Build
        run: make

      - name: Package .deb
        run: make deb

      - name: Upload .deb to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/debian/deltachat-gnome/*.deb
